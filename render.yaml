# Render infra-as-code for the Family Stories backend.
#
# After connecting the GitHub repo, Render uses this file to spin up the
# FastAPI service exactly the same way every time. Set the secret env
# vars (SUPABASE_*, GEMINI_API_KEY, …) in the Render dashboard — they
# don't belong in the repo.
#
# To deploy:
#   1. Push this file to ``main``.
#   2. Render dashboard → New → Blueprint → pick this repo.
#   3. Fill in the env vars marked ``sync: false`` below.
#
# Background worker (Celery) is intentionally omitted — narrative + video
# generation runs in ``mode=sync`` in cloud. Add a ``worker`` service
# here if you later want the async flow.

services:
  - type:    web
    name:    family-stories-backend
    # ``runtime: docker`` swaps the Python buildpack for our own Dockerfile,
    # which installs ffmpeg / libmagic / tesseract — system deps that
    # ``moviepy``, ``python-magic`` and ``pytesseract`` need at runtime.
    runtime: docker
    region:  frankfurt
    plan:    free                       # 0€, sleeps after 15 min idle
    autoDeploy: true
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      # ── Public-ish ─────────────────────────────────────────
      - key: DEBUG
        value: "False"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # ── Secrets (set in dashboard) ────────────────────────
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_DB_DIRECT_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ── App config ────────────────────────────────────────
      # M1 vision model. NOTE: gemini-1.5-flash is discontinued (404) — the
      # photo analysis silently failed in production with it. 2.5-flash is the
      # current fast vision model.
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: NARRATIVE_MAX_TOKENS
        value: "3500"
      # ── M4 video render: keep it inside the 512MB free tier ──────────────
      # MoviePy at 720p runs the instance out of memory, so every render got
      # stuck on "A processar" forever. 480p@20fps fits comfortably. Lower
      # further (640x360) if OOM still happens.
      - key: VIDEO_WIDTH
        value: "854"
      - key: VIDEO_HEIGHT
        value: "480"
      - key: VIDEO_FPS
        value: "20"
      # The frontend's deployed origin — used by the CORS middleware.
      # Set this after the first Vercel deploy gives you the URL.
      - key: CORS_ORIGINS
        sync: false
      # Optional regex for Vercel preview deploys (one regex, not a list).
      # Example: ^https://family-stories-.*\.vercel\.app$
      - key: CORS_ORIGIN_REGEX
        sync: false
      # Ollama unreachable in cloud — keep the var so config.py validates
      # but point at a sentinel so the auto-fallback to Gemini fires.
      - key: OLLAMA_BASE_URL
        value: http://disabled.invalid
      - key: OLLAMA_MODEL
        value: llama3.2:3b
      # Redis isn't deployed; Celery is unused. Settings still expects
      # the var, so we point at a no-op URL.
      - key: REDIS_URL
        value: redis://disabled.invalid:6379/0
      - key: CELERY_ENABLED
        value: "False"
