<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAFAF9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0C0A09" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Living Memory — o teu arquivo familiar, vivo. Transforma fotografias e árvore genealógica em histórias e vídeos gerados por IA." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />

    <title>living_memory</title>

    <script>
      // Early theme init — prevents the flash of wrong theme on first paint.
      (function () {
        try {
          const stored = localStorage.getItem("lm-theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const dark = stored ? stored === "dark" : prefersDark;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-stone-50 dark:bg-stone-950">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
